<div class="page-kokoro-generate">
    <header style="margin-bottom: var(--nui-space-double)">
        <h1>Kokoro — Generate</h1>
        <p class="lead">Fast English TTS with 54 built-in voices.</p>
    </header>

    <nui-card>
        <nui-input-group>
            <label for="kok-voice">Voice</label>
            <nui-select id="voice-select">
                <select id="kok-voice">
                    <option value="" disabled selected>Loading voices...</option>
                </select>
            </nui-select>
        </nui-input-group>

        <nui-input-group>
            <label for="kok-text">Text</label>
            <nui-textarea auto-resize max-rows="8" min-rows="5">
                <textarea id="kok-text" placeholder="Text to synthesize...">This is a test of the nSpeech streaming system. As you can hear, the audio begins playing almost instantly. The system generates chunks sentence by sentence, achieving incredibly low latency.</textarea>
            </nui-textarea>
        </nui-input-group>

        <nui-button-container gap="medium">
            <nui-button variant="primary" id="btn-generate">
                <button type="button">Generate</button>
            </nui-button>
            <nui-button id="btn-stop">
                <button type="button">Stop</button>
            </nui-button>
        </nui-button-container>

        <audio id="kok-audio" controls style="width: 100%; margin-top: var(--nui-space-double); display: none;"></audio>
        <p id="kok-status" style="margin-top: var(--nui-space); color: var(--color-shade6);"></p>
    </nui-card>
</div>

<script type="nui/page">
function init(element, params, nui) {
    let mediaSource = null;
    let abortController = null;

    const voiceSelect = element.querySelector('#voice-select');
    const selectEl = element.querySelector('#kok-voice');
    const textArea = element.querySelector('#kok-text');
    const generateBtn = element.querySelector('#btn-generate');
    const stopBtn = element.querySelector('#btn-stop');
    const audio = element.querySelector('#kok-audio');
    const statusEl = element.querySelector('#kok-status');

    function loadVoices() {
        fetch('/voices')
            .then(r => r.json())
            .then(d => {
                const allVoices = d.voices || [];
                const builtins = allVoices.filter(v => v.voice_type === 'builtin').map(v => ({ value: v.name, label: v.name }));
                const blended = allVoices.filter(v => v.voice_type === 'blended').map(v => ({ value: v.name, label: v.name }));
                const groups = [{ group: 'Built-in', options: builtins }];
                if (blended.length) groups.push({ group: 'Blended', options: blended });
                voiceSelect.setItems(groups);
            })
            .catch(() => {
                statusEl.textContent = 'Failed to load voices';
            });
    }

    function stop() {
        if (abortController) {
            abortController.abort();
            abortController = null;
        }
        audio.pause();
        audio.removeAttribute('src');
        if (mediaSource?.readyState === 'open') {
            mediaSource.endOfStream();
        }
        mediaSource = null;
        statusEl.textContent = '';
    }

    stopBtn.addEventListener('click', stop);

    generateBtn.addEventListener('nui-click', () => {
        const text = textArea.value.trim();
        if (!text) return;
        stop();

        const voice = selectEl.value;
        abortController = new AbortController();
        const startTime = performance.now();

        audio.style.display = 'block';
        mediaSource = new MediaSource();
        audio.src = URL.createObjectURL(mediaSource);
        audio.play().catch(() => {});

        let firstChunk = false;

        mediaSource.addEventListener('sourceopen', async () => {
            const sourceBuffer = mediaSource.addSourceBuffer('audio/mpeg');
            statusEl.textContent = 'Buffering...';

            try {
                const url = `/tts?text=${encodeURIComponent(text)}&output_format=mp3&voice_name=${encodeURIComponent(voice)}`;
                const response = await fetch(url, { signal: abortController.signal });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const reader = response.body.getReader();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    if (!firstChunk && value?.length) {
                        firstChunk = true;
                        statusEl.textContent = `TTFB: ${(performance.now() - startTime).toFixed(0)}ms`;
                    }
                    await new Promise((res, rej) => {
                        sourceBuffer.appendBuffer(value);
                        sourceBuffer.onupdateend = res;
                        sourceBuffer.onerror = rej;
                    });
                }
                if (mediaSource.readyState === 'open') {
                    mediaSource.endOfStream();
                }
                statusEl.textContent = `Done in ${(performance.now() - startTime).toFixed(0)}ms`;
            } catch (err) {
                if (err.name === 'AbortError') {
                    statusEl.textContent = 'Stopped.';
                } else {
                    statusEl.textContent = `Error: ${err.message}`;
                }
            }
        }, { once: true });
    });

    element.show = () => loadVoices();
    element.hide = () => stop();
}
</script>
