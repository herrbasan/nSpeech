<div class="page-cosyvoice-generate">
    <header style="margin-bottom: var(--nui-space-double)">
        <h1>CosyVoice — Generate</h1>
        <p class="lead">Multilingual zero-shot TTS with voice cloning.</p>
    </header>

    <nui-card>
        <nui-input-group>
            <label for="cv-voice">Voice</label>
            <nui-select id="voice-select">
                <select id="cv-voice">
                    <option value="default" selected>Default (zero-shot prompt)</option>
                </select>
            </nui-select>
        </nui-input-group>

        <nui-input-group>
            <label for="cv-text">Text</label>
            <nui-textarea auto-resize max-rows="8" min-rows="5">
                <textarea id="cv-text" placeholder="Text to synthesize...">This is a test of the CosyVoice streaming system. Voice cloning allows the engine to reproduce any speaker from just a few seconds of reference audio.</textarea>
            </nui-textarea>
        </nui-input-group>

        <nui-input-group>
            <label for="cv-instruct">Instruct (optional)</label>
            <nui-input>
                <input type="text" id="cv-instruct" placeholder="e.g. emotional, very happy, whispering, slow">
            </nui-input>
        </nui-input-group>

        <nui-input-group>
            <label for="cv-language">Language (optional)</label>
            <nui-select>
                <select id="cv-language">
                    <option value="en" selected>English</option>
                    <option value="de">German</option>
                    <option value="zh">Chinese</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="it">Italian</option>
                    <option value="ru">Russian</option>
                </select>
            </nui-select>
        </nui-input-group>

        <nui-button-container gap="medium">
            <nui-button variant="primary" id="btn-generate">
                <button type="button">Generate</button>
            </nui-button>
            <nui-button id="btn-stop">
                <button type="button">Stop</button>
            </nui-button>
        </nui-button-container>

        <audio id="cv-audio" controls style="width: 100%; margin-top: var(--nui-space-double); display: none;"></audio>
        <p id="cv-status" style="margin-top: var(--nui-space); color: var(--color-shade6);"></p>
    </nui-card>
</div>

<script type="nui/page">
function init(element, params, nui) {
    let mediaSource = null;
    let abortController = null;

    const voiceSelect = element.querySelector('#voice-select');
    const selectEl = element.querySelector('#cv-voice');
    const textArea = element.querySelector('#cv-text');
    const instructEl = element.querySelector('#cv-instruct');
    const languageEl = element.querySelector('#cv-language');
    const generateBtn = element.querySelector('#btn-generate');
    const stopBtn = element.querySelector('#btn-stop');
    const audio = element.querySelector('#cv-audio');
    const statusEl = element.querySelector('#cv-status');

    function loadVoices() {
        fetch('/voices')
            .then(r => r.json())
            .then(d => {
                const allVoices = d.voices || [];
                const cloned = allVoices
                    .filter(v => v.voice_type === 'cloned')
                    .map(v => ({ value: v.name, label: v.name }));
                const items = [{ value: 'default', label: 'Default (zero-shot prompt)' }];
                if (cloned.length) items.push(...cloned);
                voiceSelect.setItems(items);
            })
            .catch(() => {
                statusEl.textContent = 'Failed to load voices';
            });
    }

    function stop() {
        if (abortController) {
            abortController.abort();
            abortController = null;
        }
        audio.pause();
        audio.removeAttribute('src');
        if (mediaSource?.readyState === 'open') {
            mediaSource.endOfStream();
        }
        mediaSource = null;
        statusEl.textContent = '';
    }

    stopBtn.addEventListener('click', stop);

    generateBtn.addEventListener('nui-click', () => {
        const text = textArea.value.trim();
        if (!text) return;
        stop();

        const voice = selectEl.value || 'default';
        abortController = new AbortController();
        const startTime = performance.now();

        audio.style.display = 'block';
        mediaSource = new MediaSource();
        audio.src = URL.createObjectURL(mediaSource);
        audio.play().catch(() => {});

        let firstChunk = false;

        mediaSource.addEventListener('sourceopen', async () => {
            const sourceBuffer = mediaSource.addSourceBuffer('audio/mpeg');
            statusEl.textContent = 'Buffering...';

            const params = new URLSearchParams();
            params.set('text', text);
            params.set('output_format', 'mp3');
            params.set('voice_name', voice);

            const instruct = instructEl.value.trim();
            if (instruct) params.set('instruct_text', instruct);
            const lang = languageEl.value;
            if (lang) params.set('language', lang);

            try {
                const response = await fetch(`/tts?${params.toString()}`, { signal: abortController.signal });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const reader = response.body.getReader();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    if (!firstChunk && value?.length) {
                        firstChunk = true;
                        statusEl.textContent = `TTFB: ${(performance.now() - startTime).toFixed(0)}ms`;
                    }
                    await new Promise((res, rej) => {
                        sourceBuffer.appendBuffer(value);
                        sourceBuffer.onupdateend = res;
                        sourceBuffer.onerror = rej;
                    });
                }
                if (mediaSource.readyState === 'open') {
                    mediaSource.endOfStream();
                }
                statusEl.textContent = `Done in ${(performance.now() - startTime).toFixed(0)}ms`;
            } catch (err) {
                if (err.name === 'AbortError') {
                    statusEl.textContent = 'Stopped.';
                } else {
                    statusEl.textContent = `Error: ${err.message}`;
                }
            }
        }, { once: true });
    });

    element.show = () => {
        selectEl.value = 'default';
        languageEl.value = 'en';
        loadVoices();
    };
    element.hide = () => stop();
}
</script>
