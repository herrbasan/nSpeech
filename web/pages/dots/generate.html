<div class="page-dots-generate">
    <header style="margin-bottom: var(--nui-space-double)">
        <h1>dots.tts — Generate</h1>
        <p class="lead">2B fully continuous AR TTS. SOTA voice cloning quality.</p>
    </header>

    <nui-card>
        <nui-input-group>
            <label for="dots-voice">Voice</label>
            <nui-select id="voice-select">
                <select id="dots-voice">
                    <option value="default" selected>Default</option>
                </select>
            </nui-select>
        </nui-input-group>

        <nui-input-group>
            <label for="dots-text">Text</label>
            <nui-textarea auto-resize max-rows="8" min-rows="5">
                <textarea id="dots-text" placeholder="Text to synthesize...">This is a test of the dots.tts streaming system. The fully continuous autoregressive architecture produces highly natural speech with excellent voice cloning fidelity.</textarea>
            </nui-textarea>
        </nui-input-group>

        <nui-button id="btn-arena-sample">
            <button type="button">Random Arena Sample</button>
        </nui-button>
        <p id="dots-arena-info" style="margin-top: var(--nui-space-half); color: var(--color-shade6); font-size: 0.85em;"></p>

        <nui-input-group>
            <label for="dots-language">Language (optional)</label>
            <nui-select>
                <select id="dots-language">
                    <option value="" selected>Auto-detect</option>
                    <option value="en">English</option>
                    <option value="zh">Chinese</option>
                    <option value="de">German</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="it">Italian</option>
                    <option value="ru">Russian</option>
                </select>
            </nui-select>
        </nui-input-group>

        <nui-input-group>
            <label for="dots-seed">Seed (for prosody variation)</label>
            <nui-input>
                <input type="number" id="dots-seed" value="42">
            </nui-input>
        </nui-input-group>

        <nui-input-group>
            <label for="dots-steps">Steps (quality vs speed): <span id="dots-steps-val">4</span></label>
            <nui-input>
                <input type="range" id="dots-steps" min="1" max="16" step="1" value="4">
            </nui-input>
        </nui-input-group>

        <nui-input-group id="dots-guidance-group" style="display: none;">
            <label for="dots-guidance">Guidance Scale: <span id="dots-guidance-val">1.2</span></label>
            <nui-input>
                <input type="range" id="dots-guidance" min="0" max="3" step="0.1" value="1.2">
            </nui-input>
        </nui-input-group>

        <nui-input-group>
            <nui-input>
                <input type="checkbox" id="dots-offline">
                <label for="dots-offline">Offline mode (no streaming — best quality, no TTFA)</label>
            </nui-input>
        </nui-input-group>

        <nui-button-container gap="medium">
            <nui-button variant="primary" id="btn-generate">
                <button type="button">Generate</button>
            </nui-button>
            <nui-button id="btn-stop">
                <button type="button">Stop</button>
            </nui-button>
        </nui-button-container>

        <audio id="dots-audio" controls style="width: 100%; margin-top: var(--nui-space-double); display: none;"></audio>
        <p id="dots-status" style="margin-top: var(--nui-space); color: var(--color-shade6);"></p>
    </nui-card>
</div>

<script type="nui/page">
function init(element, params, nui) {
    let mediaSource = null;
    let abortController = null;

    const voiceSelect = element.querySelector('#voice-select');
    const selectEl = element.querySelector('#dots-voice');
    const textArea = element.querySelector('#dots-text');
    const languageEl = element.querySelector('#dots-language');
    const seedEl = element.querySelector('#dots-seed');
    const stepsEl = element.querySelector('#dots-steps');
    const stepsValEl = element.querySelector('#dots-steps-val');
    const guidanceEl = element.querySelector('#dots-guidance');
    const guidanceValEl = element.querySelector('#dots-guidance-val');
    const offlineEl = element.querySelector('#dots-offline');
    const generateBtn = element.querySelector('#btn-generate');
    const stopBtn = element.querySelector('#btn-stop');
    const arenaBtn = element.querySelector('#btn-arena-sample');
    const arenaInfo = element.querySelector('#dots-arena-info');
    const audio = element.querySelector('#dots-audio');

    // Manual auto-resize fallback — adjust height to fit content
    function autoResize(ta) {
        ta.style.height = 'auto';
        ta.style.height = ta.scrollHeight + 'px';
    }
    textArea.addEventListener('input', () => autoResize(textArea));
    autoResize(textArea);
    const statusEl = element.querySelector('#dots-status');

    // Update slider value displays
    stepsEl.addEventListener('input', () => stepsValEl.textContent = stepsEl.value);
    guidanceEl.addEventListener('input', () => guidanceValEl.textContent = guidanceEl.value);

    arenaBtn.addEventListener('nui-click', () => {
        fetch('/arena-samples')
            .then(r => r.json())
            .then(d => {
                if (d.text) {
                    textArea.value = d.text;
                    autoResize(textArea);
                    arenaInfo.textContent = `From: ${d.speaker} — "${d.topic}"`;
                }
            })
            .catch(() => {
                arenaInfo.textContent = 'No arena samples available.';
            });
    });

    function loadVoices() {
        fetch('/v1/voices')
            .then(r => r.json())
            .then(d => {
                const allVoices = d.voices || [];
                const cloned = allVoices
                    .filter(v => v.voice_type === 'cloned')
                    .map(v => ({ value: v.name, label: v.name }));
                const items = [{ value: 'default', label: 'Default' }];
                if (cloned.length) items.push(...cloned);
                voiceSelect.setItems(items);
            })
            .catch(() => {
                statusEl.textContent = 'Failed to load voices';
            });
    }

    function stop() {
        if (abortController) {
            abortController.abort();
            abortController = null;
        }
        audio.pause();
        // Don't removeAttribute('src') — it fires an async error that corrupts the next playback.
        if (mediaSource?.readyState === 'open') {
            try { mediaSource.endOfStream(); } catch (_) {}
        }
        mediaSource = null;
        statusEl.textContent = '';
    }

    stopBtn.addEventListener('click', stop);

    generateBtn.querySelector('button').addEventListener('click', () => {
        const text = textArea.value.trim();
        if (!text) return;
        stop();

        const voice = selectEl.value || 'default';
        abortController = new AbortController();
        const startTime = performance.now();

        audio.style.display = 'block';
        mediaSource = new MediaSource();
        audio.src = URL.createObjectURL(mediaSource);

        let firstChunk = false;

        mediaSource.addEventListener('sourceopen', async () => {
            const sourceBuffer = mediaSource.addSourceBuffer('audio/mpeg');
            statusEl.textContent = 'Buffering...';

            const body = {
                input: text,
                voice: voice,
                response_format: 'mp3',
                extra_body: {
                    offline: offlineEl.checked,
                    language: languageEl.value || undefined,
                    seed: seedEl.value ? Number(seedEl.value) : undefined,
                    steps: stepsEl.value ? Number(stepsEl.value) : undefined,
                    guidance_scale: guidanceEl.value ? Number(guidanceEl.value) : undefined,
                },
            };

            try {
                const response = await fetch('/v1/audio/speech', {
                    method: 'POST',
                    headers: { 'content-type': 'application/json' },
                    body: JSON.stringify(body),
                    signal: abortController.signal,
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const reader = response.body.getReader();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    if (!firstChunk && value?.length) {
                        firstChunk = true;
                        statusEl.textContent = `TTFB: ${(performance.now() - startTime).toFixed(0)}ms`;
                    }
                    await new Promise((res, rej) => {
                        sourceBuffer.appendBuffer(value);
                        sourceBuffer.onupdateend = res;
                        sourceBuffer.onerror = rej;
                    });
                    if (audio.paused && sourceBuffer.buffered.length > 0) {
                        audio.play().catch(() => {});
                    }
                }
                if (mediaSource.readyState === 'open') {
                    mediaSource.endOfStream();
                }
                statusEl.textContent = `Done in ${(performance.now() - startTime).toFixed(0)}ms`;
            } catch (err) {
                if (err.name === 'AbortError') {
                    statusEl.textContent = 'Stopped.';
                } else {
                    statusEl.textContent = `Error: ${err.message}`;
                }
            }
        }, { once: true });
    });

    element.show = () => {
        selectEl.value = 'default';
        loadVoices();
    };
    element.hide = () => stop();
}
</script>
